<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dannote | Secure Cloud</title>
    <style>
        :root {
            --bg-color: #f4f7f6; --sidebar-bg: #ffffff; --header-bg: #1a1a1a;
            --header-text: #ffffff; --text-main: #333333; --card-bg: #ffffff;
            --border-color: #dddddd; --accent-color: #c5a059;
            --tag-urgent: #e74c3c; --tag-important: #f39c12; --tag-info: #3498db; --tag-done: #2ecc71;
        }
        [data-theme="cream"] { --bg-color: #f5f5dc; --sidebar-bg: #fffdd0; --header-bg: #4a3728; --text-main: #5d4037; --card-bg: #fffef0; --border-color: #d2b48c; }
        [data-theme="dark"] { --bg-color: #121212; --sidebar-bg: #1e1e1e; --header-bg: #000000; --header-text: #e0e0e0; --text-main: #e0e0e0; --card-bg: #2d2d2d; --border-color: #444444; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s; }

        header { background-color: var(--header-bg); color: var(--header-text); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .dannote-title { font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; color: var(--accent-color); }
        .header-center { font-weight: bold; letter-spacing: 3px; font-size: 1.5rem; }

        .container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 1.5rem; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-hidden { margin-left: -280px; }

        .add-day-btn { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 1.5rem; transition: 0.2s; }
        .add-day-btn:hover { filter: brightness(1.1); }
        .add-day-btn:disabled { background: #ccc; cursor: not-allowed; }

        #day-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .day-item { padding: 15px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; background: var(--card-bg); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .day-item.active { border-left: 6px solid var(--accent-color); background: rgba(197, 160, 89, 0.1); border-color: var(--accent-color); }
        .delete-btn { border: none; background: none; color: #ccc; cursor: pointer; font-size: 1.1rem; }
        .delete-btn:hover { color: #e74c3c; }

        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .search-bar { padding: 8px 15px; width: 250px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .note-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .note-card.done { opacity: 0.5; filter: grayscale(0.5); }
        
        .note-time { font-size: 0.75rem; color: #999; margin-bottom: 5px; font-weight: bold; }
        .note-room { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .note-text { margin: 15px 0; line-height: 1.5; font-size: 1rem; white-space: pre-wrap; }
        
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; color: white; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }
        .tag-urgent { background: var(--tag-urgent); }
        .tag-important { background: var(--tag-important); }
        .tag-info { background: var(--tag-info); }
        .tag-done { background: var(--tag-done); }

        .note-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border-color); cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(3px); }
        .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 12px; width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; margin-bottom: 1rem; padding: 10px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-main); }

        .fmt-red { color: #e74c3c; font-weight: bold; }
        .fmt-underline { text-decoration: underline; }
        .fmt-strike { text-decoration: line-through; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button id="sidebar-toggle" style="background:none; border:1px solid white; color:white; padding:5px 12px; border-radius:4px; cursor:pointer;">☰</button>
            <div class="dannote-title"> Dannote</div>
        </div>
        <div class="header-center">KING DAVID</div>
        <div class="header-right">
            <select id="theme-selector" style="background:#333; color:white; border:none; padding:5px; border-radius:4px;">
                <option value="light">Light</option>
                <option value="cream">Cream</option>
                <option value="dark">Dark</option>
            </select>
        </div>
    </header>

    <div class="container">
        <aside id="sidebar">
            <button class="add-day-btn" id="new-day-trigger"> Create New Day</button>
            <div id="day-list"></div>
            <div style="text-align:center; font-size:0.7rem; color:gray; margin-top:10px; border-top:1px solid var(--border-color); padding-top:10px;">
                Powered by Danylevskij v1.2.7 (Secure)
            </div>
        </aside>

        <main>
            <div class="main-header">
                <h2 id="day-label">Select a Day</h2>
                <input type="text" id="search" class="search-bar" placeholder="Search notes...">
            </div>
            <button class="add-day-btn" id="new-note-trigger" style="display:none; width:auto; padding:10px 25px;">+ Add Shift Note</button>
            <div class="notes-grid" id="notes-grid"></div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:1rem; color:var(--accent-color);">Private Shift Note</h3>
            <input type="text" id="m-room" placeholder="Room Number">
            <textarea id="m-text" placeholder="Note details..." rows="5"></textarea>
            
            <label style="font-size:0.8rem; font-weight:bold; display:block; margin-bottom:5px;">Private Photo:</label>
            <input type="file" id="m-file" accept="image/*">

            <select id="m-tag">
                <option value="info">Info (Blue)</option>
                <option value="important">Important (Orange)</option>
                <option value="urgent">Urgent (Red)</option>
            </select>
            
            <button id="m-save" class="add-day-btn">Save to Firestore</button>
            <button id="m-cancel" style="width:100%; background:none; border:none; color:gray; cursor:pointer; font-weight:bold;">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjwiE5ObnWRMnWHqsLimaM7PeyoOGZGaU",
            authDomain: "kd-handover.firebaseapp.com",
            projectId: "kd-handover",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeDayId = null;

        // --- УТИЛИТЫ ---
        const compressImg = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 800;
                        let w = img.width, h = img.height;
                        if (w > maxW) { h *= maxW / w; w = maxW; }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // Качество 60% для экономии места
                    };
                };
            });
        };

        // --- ДНИ ---
        document.getElementById('sidebar-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('sidebar-hidden');

        document.getElementById('new-day-trigger').onclick = async () => {
            const d = prompt("Enter Date (e.g. 14 April):", new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long'}));
            if(d) await addDoc(collection(db, "days"), { date: d, createdAt: Date.now() });
        };

        onSnapshot(query(collection(db, "days"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('day-list');
            list.innerHTML = '';
            snap.forEach(dDoc => {
                const div = document.createElement('div');
                div.className = `day-item ${activeDayId === dDoc.id ? 'active' : ''}`;
                div.innerHTML = `<span>${dDoc.data().date}</span><button class="delete-btn">✕</button>`;
                div.onclick = () => {
                    activeDayId = dDoc.id;
                    document.getElementById('day-label').innerText = dDoc.data().date;
                    document.getElementById('new-note-trigger').style.display = 'block';
                    loadNotes(dDoc.id);
                    document.querySelectorAll('.day-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                };
                div.querySelector('.delete-btn').onclick = async (e) => {
                    e.stopPropagation();
                    if(confirm("Delete this day and ALL its notes?")) {
                        const notes = await getDocs(collection(db, `days/${dDoc.id}/notes`));
                        notes.forEach(async n => await deleteDoc(doc(db, `days/${dDoc.id}/notes`, n.id)));
                        await deleteDoc(doc(db, "days", dDoc.id));
                    }
                };
                list.appendChild(div);
            });
        });

        // --- ЗАМЕТКИ ---
        function loadNotes(dayId) {
            onSnapshot(query(collection(db, `days/${dayId}/notes`), orderBy("createdAt", "desc")), (snap) => {
                if(activeDayId !== dayId) return;
                const grid = document.getElementById('notes-grid');
                const search = document.getElementById('search').value.toLowerCase();
                grid.innerHTML = '';

                snap.forEach(nDoc => {
                    const n = nDoc.data();
                    if(n.text.toLowerCase().includes(search) || (n.room && n.room.toLowerCase().includes(search))) {
                        const card = document.createElement('div');
                        card.className = `note-card ${n.done ? 'done' : ''}`;
                        card.innerHTML = `
                            <div class="note-time">${n.time}</div>
                            <span class="tag tag-${n.tag}">${n.tag}</span>
                            ${n.room ? `<div class="note-room">Room: ${n.room}</div>` : ''}
                            <div class="note-text">${n.text}</div>
                            ${n.photo ? `<img src="${n.photo}" class="note-img" onclick="window.open(this.src)">` : ''}
                            <div style="margin-top:15px; display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px;">
                                <button onclick="window.tglDone('${nDoc.id}', ${n.done})" style="border:none; background:none; color:var(--tag-done); cursor:pointer; font-weight:bold;">${n.done ? 'UNDO' : 'DONE'}</button>
                                <button onclick="window.delNote('${nDoc.id}')" style="border:none; background:none; color:var(--tag-urgent); cursor:pointer; font-weight:bold;">DELETE</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            });
        }

        window.delNote = async (id) => { if(confirm("Delete note?")) await deleteDoc(doc(db, `days/${activeDayId}/notes`, id)); };
        window.tglDone = async (id, s) => await updateDoc(doc(db, `days/${activeDayId}/notes`, id), { done: !s, tag: !s ? 'done' : 'info' });

        // --- МОДАЛКА ---
        const modal = document.getElementById('modal');
        document.getElementById('new-note-trigger').onclick = () => modal.style.display = 'flex';
        document.getElementById('m-cancel').onclick = () => { modal.style.display = 'none'; document.getElementById('m-file').value = ''; };

        document.getElementById('m-save').onclick = async () => {
            const text = document.getElementById('m-text').value;
            const room = document.getElementById('m-room').value;
            const tag = document.getElementById('m-tag').value;
            const file = document.getElementById('m-file').files[0];
            const btn = document.getElementById('m-save');

            if(!text) return alert("Write something!");

            btn.innerText = "Securing & Saving...";
            btn.disabled = true;

            try {
                let base64Photo = null;
                if(file) base64Photo = await compressImg(file);

                await addDoc(collection(db, `days/${activeDayId}/notes`), {
                    text, room, tag,
                    photo: base64Photo,
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    createdAt: Date.now(),
                    done: false
                });

                modal.style.display = 'none';
                document.getElementById('m-text').value = '';
                document.getElementById('m-room').value = '';
                document.getElementById('m-file').value = '';
            } catch (e) {
                alert("Error: Photo might be too large even after compression.");
            } finally {
                btn.innerText = "Save to Firestore";
                btn.disabled = false;
            }
        };

        document.getElementById('theme-selector').onchange = (e) => document.body.setAttribute('data-theme', e.target.value);
        document.getElementById('search').oninput = () => loadNotes(activeDayId);
    </script>
</body>
</html>
